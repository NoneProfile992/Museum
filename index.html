<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #ffffff;
}

model-viewer {
  width: 100%;
  height: 100%;
}
</style>
</head>
<body>

<model-viewer 
  src="musmodel.glb"
  camera-controls
  min-camera-orbit="auto 60deg 0.1m"
  max-camera-orbit="auto 120deg 50m"
  min-field-of-view="10deg"
  max-field-of-view="60deg"
  exposure="1"
  shadow-intensity="1"
  environment-image="neutral">
</model-viewer>

</body>
</html>
